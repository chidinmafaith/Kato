<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kató Akwete Waitlist - Join</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'kato-bg': '#F8F5F0',
            'kato-brown': '#3E2723',
            'kato-tan': '#D7C4A3',
            'kato-dark-brown': '#2D1A11',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F8F5F0;
      color: #3E2723;
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HLKZ0B3RVP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-HLKZ0B3RVP');
  </script>
</head>
<body class="min-h-screen flex flex-col relative bg-[#E8E4D9]">
  <div class="absolute inset-0 opacity-20 pointer-events-none z-0" style="background-image: repeating-linear-gradient(45deg, #8B5A44 0, #8B5A44 10px, transparent 10px, transparent 20px, #7B8B4F 20px, #7B8B4F 30px, transparent 30px, transparent 40px)"></div>
  
  <nav class="flex justify-between items-center py-6 px-8 md:px-16 max-w-7xl mx-auto w-full relative z-10">
    <a href="index.html" class="text-4xl font-serif font-bold italic tracking-tighter text-kato-brown">Kató</a>
    <div class="hidden md:flex space-x-8 items-center font-serif text-lg text-kato-brown">
      <a href="waitlist.html" class="hover:text-kato-tan transition-colors font-semibold">Join Waitlist</a>
      <button class="hover:text-kato-tan transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
      </button>
    </div>
  </nav>
  
  <main class="flex-grow flex items-center justify-center p-4 z-10 pb-20 relative">
    <div class="bg-kato-bg p-8 md:p-12 max-w-lg w-full shadow-2xl relative border-[12px] border-transparent" style="border-image: repeating-linear-gradient(45deg, #3E2723 0, #3E2723 15px, #D7C4A3 15px, #D7C4A3 30px, #8B5A44 30px, #8B5A44 45px) 15">
      
      <div class="text-center mb-8">
        <h1 class="font-serif text-4xl font-bold italic mb-2 text-kato-brown">Kató</h1>
        <h2 class="font-serif text-2xl italic text-kato-brown">Join the Akwete Collection Waitlist</h2>
      </div>

      <div id="success-message" class="text-center py-8 hidden">
        <h3 class="font-serif text-2xl text-green-700 mb-4">Thank you for joining!</h3>
        <p class="font-sans text-gray-700 mb-8">We'll be in touch soon with updates on the Akwete Collection.</p>
        <a href="index.html" class="inline-block bg-kato-brown text-kato-bg font-serif px-6 py-2 rounded-sm hover:bg-kato-dark-brown transition-colors">
          Return Home
        </a>
      </div>

      <form id="waitlist-form" class="space-y-6">
        <div>
          <label for="fullName" class="block font-serif text-lg mb-2 text-kato-brown">Full Name</label>
          <input type="text" id="fullName" name="fullName" required class="w-full bg-[#D7C4A3]/40 border border-kato-brown/20 rounded-sm px-4 py-3 focus:outline-none focus:ring-2 focus:ring-kato-brown font-sans text-kato-brown" />
        </div>
        
        <div>
          <label for="email" class="block font-serif text-lg mb-2 text-kato-brown">Email Address</label>
          <input type="email" id="email" name="email" required class="w-full bg-[#D7C4A3]/40 border border-kato-brown/20 rounded-sm px-4 py-3 focus:outline-none focus:ring-2 focus:ring-kato-brown font-sans text-kato-brown" />
        </div>

        <div>
          <label for="expectations" class="block font-serif text-lg mb-2 text-kato-brown">What are you most expectant about?</label>
          <textarea id="expectations" name="expectations" rows="4" placeholder="e.g., Specific patterns, limited collections, exclusive pre-orders..." class="w-full bg-[#D7C4A3]/40 border border-kato-brown/20 rounded-sm px-4 py-3 focus:outline-none focus:ring-2 focus:ring-kato-brown font-sans placeholder:text-kato-brown/50 resize-none text-kato-brown"></textarea>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-kato-brown text-kato-bg font-serif text-xl py-4 rounded-sm hover:bg-kato-dark-brown transition-colors disabled:opacity-70">
          Submit My Interest
        </button>

        <p class="text-center font-serif text-sm mt-6 text-kato-brown">
          You're one step closer to handwoven excellence.
        </p>
      </form>
    </div>
  </main>

  <script>
    document.getElementById('waitlist-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = 'Submitting...';

      // Simulate network request
      setTimeout(() => {
        const formData = {
          fullName: document.getElementById('fullName').value,
          email: document.getElementById('email').value,
          expectations: document.getElementById('expectations').value,
          id: Date.now().toString(),
          createdAt: new Date().toISOString()
        };
        
        const existing = JSON.parse(localStorage.getItem('kato_waitlist') || '[]');
        localStorage.setItem('kato_waitlist', JSON.stringify([...existing, formData]));

        document.getElementById('waitlist-form').classList.add('hidden');
        document.getElementById('success-message').classList.remove('hidden');
      }, 800);
    });
  </script>
</body>
</html>
